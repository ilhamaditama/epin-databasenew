<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EpinStoreOffc - Reseller Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a00 50%, #ff6600 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .navbar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .logo h2 { color: #ff884d; font-size: 20px; }
        .logo span { color: white; font-size: 12px; }
        .user-info { color: white; display: flex; align-items: center; gap: 15px; }
        .badge { background: #ff884d; color: #0a0a0a; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .btn-logout { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 10px; color: white; cursor: pointer; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .stat-card i { font-size: 2rem; color: #ff884d; margin-bottom: 10px; }
        .stat-card h3 { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        .stat-card p { color: #ff884d; font-size: 2rem; font-weight: bold; }
        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .card h2 { color: #ff884d; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 12px;
            color: white;
        }
        button {
            background: linear-gradient(90deg, #ff884d, #cc6633);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <h2>EPINSTORE<span>OFFC</span></h2>
                <span>Reseller Dashboard</span>
            </div>
            <div class="user-info">
                <span class="badge"><i class="fas fa-store"></i> RESELLER</span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h3>Total Nomer</h3><p id="totalNumbers">0</p></div></div>
        </div>

        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Number</h2>
            <form id="addForm">
                <input type="text" id="phoneNumber" placeholder="628123456789" required>
                <button type="submit">Add Number</button>
            </form>
            <div id="addResult" style="margin-top:15px; color:#ff884d;"></div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = 'https://epin-3b848-default-rtdb.asia-southeast1.firebasedatabase.app/';
        
        async function fetchData(url) {
            try {
                const res = await fetch(url);
                return await res.json();
            } catch (e) { return null; }
        }

        async function loadStats() {
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const total = Array.isArray(numbers) ? numbers.length : 0;
            document.getElementById('totalNumbers').innerText = total;
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phoneNumber').value;
            if (!phone.match(/^62\d{8,13}$/)) {
                document.getElementById('addResult').innerHTML = 'Format nomor salah! Gunakan 62xxxxxxxxxx';
                return;
            }
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const current = Array.isArray(numbers) ? numbers : [];
            if (current.includes(phone)) {
                document.getElementById('addResult').innerHTML = 'Nomor sudah terdaftar!';
                return;
            }
            current.push(phone);
            await fetch(FIREBASE_URL + 'epin_active_numbers.json', {
                method: 'PUT',
                body: JSON.stringify(current),
                headers: { 'Content-Type': 'application/json' }
            });
            document.getElementById('addResult').innerHTML = '✅ Berhasil ditambahkan!';
            document.getElementById('phoneNumber').value = '';
            loadStats();
        });

        function logout() {
            localStorage.removeItem('epin_session');
            window.location.href = 'index.html';
        }

        loadStats();
        setInterval(loadStats, 10000);
    </script>
</body>
</html>
