<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EpinStoreOffc - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a00 50%, #ff6600 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            animation: fadeInScale 0.6s ease-out;
        }
        .login-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 30px;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 60px; color: #ff6600; }
        .logo h1 { color: white; font-size: 28px; margin-top: 10px; }
        .logo span { color: #ff6600; font-size: 12px; }
        .input-group { margin-bottom: 20px; }
        .input-group i {
            position: absolute;
            margin-top: 18px;
            margin-left: 15px;
            color: #ff6600;
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 50px;
            color: white;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ff6600;
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ff6600, #cc4400);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-msg {
            background: rgba(255,0,0,0.2);
            color: #ff6b6b;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-store"></i>
                <h1>EPINSTORE<span>OFFC</span></h1>
                <span>License Management System</span>
            </div>
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phoneInput" placeholder="Nomor WhatsApp (628xxxx)">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="passwordInput" placeholder="Password">
            </div>
            <button class="btn-login" onclick="handleLogin()">Login</button>
            <div class="error-msg" id="errorMsg"></div>
            <div class="footer">Secure System</div>
        </div>
    </div>
    <script>
        async function handleLogin() {
            const phone = document.getElementById('phoneInput').value;
            const password = document.getElementById('passwordInput').value;
            if (!phone || !password) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerHTML = 'Isi nomor dan password!';
                return;
            }
            let formattedPhone = phone.replace(/[^0-9]/g, '');
            if (!formattedPhone.startsWith('62')) formattedPhone = '62' + formattedPhone;
            
            // Langsung redirect berdasarkan role (sementara)
            if (password === 'epinyaya') {
                localStorage.setItem('epin_session', JSON.stringify({ phone: formattedPhone, role: 'owner', expires: Date.now() + 30*60*1000 }));
                window.location.href = 'owner.html';
            } else if (password === 'epinsuper') {
                localStorage.setItem('epin_session', JSON.stringify({ phone: formattedPhone, role: 'super_reseller', expires: Date.now() + 30*60*1000 }));
                window.location.href = 'superreseller.html';
            } else if (password === 'epinreseller') {
                localStorage.setItem('epin_session', JSON.stringify({ phone: formattedPhone, role: 'reseller', expires: Date.now() + 30*60*1000 }));
                window.location.href = 'reseller.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').innerHTML = 'Password salah!';
            }
        }
    </script>
</body>
</html>
