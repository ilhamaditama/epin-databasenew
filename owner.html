<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EpinStoreOffc - Owner Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a00 50%, #ff6600 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .navbar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .logo h2 { color: #ff6600; font-size: 20px; }
        .logo span { color: white; font-size: 12px; }
        .user-info { color: white; display: flex; align-items: center; gap: 15px; }
        .badge { background: #ff6600; color: #0a0a0a; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .btn-logout { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 10px; color: white; cursor: pointer; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .stat-card i { font-size: 2rem; color: #ff6600; margin-bottom: 10px; }
        .stat-card h3 { color: rgba(255,255,255,0.8); font-size: 0.85rem; }
        .stat-card p { color: #ff6600; font-size: 2rem; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,102,0,0.3);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active { background: #ff6600; color: #0a0a0a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,102,0,0.3);
        }
        .card h2 { color: #ff6600; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,102,0,0.3);
            border-radius: 12px;
            color: white;
        }
        button {
            background: linear-gradient(90deg, #ff6600, #cc4400);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .number-list { max-height: 400px; overflow-y: auto; }
        .number-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-small { padding: 6px 12px; width: auto; margin: 0 5px; }
        .user-table { width: 100%; border-collapse: collapse; }
        .user-table th, .user-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,102,0,0.3); }
        .user-table th { color: #ff6600; }
        .user-table td { color: white; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .number-item { flex-direction: column; }
            .btn-small { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <h2>EPINSTORE<span>OFFC</span></h2>
                <span>Owner Dashboard</span>
            </div>
            <div class="user-info">
                <span class="badge"><i class="fas fa-crown"></i> OWNER</span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><i class="fas fa-check-circle"></i><div><h3>Total Nomer</h3><p id="totalNumbers">0</p></div></div>
            <div class="stat-card"><i class="fas fa-users"></i><div><h3>Total Owner</h3><p id="totalOwner">0</p></div></div>
            <div class="stat-card"><i class="fas fa-star"></i><div><h3>Super Reseller</h3><p id="totalSuperReseller">0</p></div></div>
            <div class="stat-card"><i class="fas fa-store"></i><div><h3>Reseller</h3><p id="totalReseller">0</p></div></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="numbers">Manage Numbers</button>
            <button class="tab-btn" data-tab="users">Manage Users</button>
            <button class="tab-btn" data-tab="activity">Activity Log</button>
        </div>

        <div id="numbersTab" class="tab-content active">
            <div class="card">
                <h2><i class="fas fa-list"></i> Active Numbers</h2>
                <div class="number-list" id="activeList"></div>
            </div>
        </div>

        <div id="usersTab" class="tab-content">
            <div class="card">
                <h2><i class="fas fa-users"></i> Manage Users</h2>
                <div id="userList" class="user-table-container"></div>
            </div>
        </div>

        <div id="activityTab" class="tab-content">
            <div class="card">
                <h2><i class="fas fa-history"></i> Activity Log</h2>
                <div id="activityList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://epin-database.vercel.app/api/numbers';
        const FIREBASE_URL = 'https://epin-3b848-default-rtdb.asia-southeast1.firebasedatabase.app/';
        
        async function fetchData(url) {
            try {
                const res = await fetch(url);
                return await res.json();
            } catch (e) { return null; }
        }

        async function loadStats() {
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const total = Array.isArray(numbers) ? numbers.length : 0;
            document.getElementById('totalNumbers').innerText = total;
            
            const users = await fetchData(FIREBASE_URL + 'epin_users.json');
            let owner = 0, superReseller = 0, reseller = 0;
            if (users) {
                Object.values(users).forEach(u => {
                    if (u.role === 'owner') owner++;
                    else if (u.role === 'super_reseller') superReseller++;
                    else if (u.role === 'reseller') reseller++;
                });
            }
            document.getElementById('totalOwner').innerText = owner;
            document.getElementById('totalSuperReseller').innerText = superReseller;
            document.getElementById('totalReseller').innerText = reseller;
        }

        async function loadActiveList() {
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const container = document.getElementById('activeList');
            if (!numbers || numbers.length === 0) {
                container.innerHTML = '<p style="color:white;">Tidak ada nomer terdaftar</p>';
                return;
            }
            container.innerHTML = numbers.map(num => `
                <div class="number-item">
                    <span><i class="fas fa-phone"></i> ${num}</span>
                    <div>
                        <button class="btn-small" onclick="deleteNumber('${num}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteNumber(num) {
            if (!confirm(`Hapus ${num}?`)) return;
            const numbers = await fetchData(FIREBASE_URL + 'epin_active_numbers.json');
            const newNumbers = Array.isArray(numbers) ? numbers.filter(n => n !== num) : [];
            await fetch(FIREBASE_URL + 'epin_active_numbers.json', {
                method: 'PUT',
                body: JSON.stringify(newNumbers),
                headers: { 'Content-Type': 'application/json' }
            });
            alert('Berhasil dihapus!');
            loadStats();
            loadActiveList();
        }

        async function loadUsers() {
            const users = await fetchData(FIREBASE_URL + 'epin_users.json');
            const container = document.getElementById('userList');
            if (!users || Object.keys(users).length === 0) {
                container.innerHTML = '<p style="color:white;">Tidak ada user</p>';
                return;
            }
            let html = '<table class="user-table"><tr><th>Nomor</th><th>Role</th><th>Nama</th><th>Aksi</th></tr>';
            for (const [phone, user] of Object.entries(users)) {
                html += `
                    <tr>
                        <td>${phone}</td>
                        <td>
                            <select onchange="updateRole('${phone}', this.value)">
                                <option value="owner" ${user.role === 'owner' ? 'selected' : ''}>Owner</option>
                                <option value="super_reseller" ${user.role === 'super_reseller' ? 'selected' : ''}>Super Reseller</option>
                                <option value="reseller" ${user.role === 'reseller' ? 'selected' : ''}>Reseller</option>
                            </select>
                        </td>
                        <td><input type="text" value="${user.name || ''}" onchange="updateName('${phone}', this.value)" style="width:150px;"></td>
                        <td><button class="btn-small" onclick="resetPassword('${phone}')">Reset Pass</button></td>
                    </tr>
                `;
            }
            html += '</table>';
            container.innerHTML = html;
        }

        async function updateRole(phone, role) {
            await fetch(FIREBASE_URL + 'epin_users/' + phone + '/role.json', {
                method: 'PUT',
                body: JSON.stringify(role)
            });
            alert('Role berhasil diupdate!');
            loadStats();
        }

        async function updateName(phone, name) {
            await fetch(FIREBASE_URL + 'epin_users/' + phone + '/name.json', {
                method: 'PUT',
                body: JSON.stringify(name)
            });
            alert('Nama berhasil diupdate!');
        }

        async function resetPassword(phone) {
            const newPass = prompt('Password baru untuk ' + phone);
            if (newPass) {
                await fetch(FIREBASE_URL + 'epin_users/' + phone + '/password.json', {
                    method: 'PUT',
                    body: JSON.stringify(newPass)
                });
                alert('Password berhasil direset!');
            }
        }

        // Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
                if (btn.dataset.tab === 'users') loadUsers();
                if (btn.dataset.tab === 'activity') loadActivity();
            });
        });

        async function loadActivity() {
            const activity = await fetchData(FIREBASE_URL + 'epin_activity_log.json');
            const container = document.getElementById('activityList');
            if (!activity || activity.length === 0) {
                container.innerHTML = '<p style="color:white;">Belum ada aktivitas</p>';
                return;
            }
            container.innerHTML = activity.map(a => `
                <div style="background:rgba(255,255,255,0.05); padding:10px; margin:5px 0; border-radius:8px;">
                    <strong>${a.action}</strong> - ${a.role}<br>
                    <small>${a.details} | ${a.date} ${a.time}</small>
                </div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('epin_session');
            window.location.href = 'index.html';
        }

        loadStats();
        loadActiveList();
        setInterval(loadStats, 10000);
    </script>
</body>
</html>
